---
- name: Install primary K3s server
  hosts: k3s_servers[0]
  become: true
  handlers:
    - name: Restart k3s
      ansible.builtin.service:
        name: k3s
        state: restarted

  tasks:
    - name: Ensure K3s config directory exists
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Copy K3s server configuration
      ansible.builtin.copy:
        src: "{{ k3s_config_source }}"
        dest: "{{ k3s_config_path }}"
        owner: root
        group: root
        mode: "0644"
      notify: Restart k3s

    - name: Configure K3s API certificate SANs
      ansible.builtin.blockinfile:
        path: "{{ k3s_config_path }}"
        marker: "# {mark} ANSIBLE MANAGED K3S TLS SANS"
        block: |
          tls-san:
          {% for san in ([k3s_api_endpoint] + k3s_tls_sans) | unique %}
            - "{{ san }}"
          {% endfor %}
      when: k3s_api_endpoint | length > 0
      notify: Restart k3s

    - name: Download K3s installer
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        owner: root
        group: root
        mode: "0755"

    - name: Install latest primary K3s server
      ansible.builtin.command: /tmp/k3s-install.sh
      args:
        creates: /usr/local/bin/k3s
      environment:
        INSTALL_K3S_EXEC: server --cluster-init
      when: k3s_version | length == 0

    - name: Install pinned primary K3s server
      ansible.builtin.command: /tmp/k3s-install.sh
      args:
        creates: /usr/local/bin/k3s
      environment:
        INSTALL_K3S_EXEC: server --cluster-init
        INSTALL_K3S_VERSION: "{{ k3s_version }}"
      when: k3s_version | length > 0

    - name: Ensure primary K3s server is enabled and running
      ansible.builtin.service:
        name: k3s
        enabled: true
        state: started

    - name: Wait for primary Kubernetes API
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 6443
        timeout: 180
      delegate_to: localhost
      become: false

    - name: Wait for primary node token
      ansible.builtin.wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        timeout: 120

    - name: Read primary node token
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: primary_k3s_node_token

    - name: Store primary node token for joining servers
      ansible.builtin.set_fact:
        k3s_node_token: "{{ primary_k3s_node_token.content | b64decode | trim }}"

- name: Join additional K3s servers
  hosts: k3s_servers
  become: true
  handlers:
    - name: Restart k3s
      ansible.builtin.service:
        name: k3s
        state: restarted

  tasks:
    - name: Skip primary server
      ansible.builtin.meta: end_host
      when: inventory_hostname == groups['k3s_servers'][0]

    - name: Ensure K3s config directory exists
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Copy K3s server configuration
      ansible.builtin.copy:
        src: "{{ k3s_config_source }}"
        dest: "{{ k3s_config_path }}"
        owner: root
        group: root
        mode: "0644"
      notify: Restart k3s

    - name: Configure K3s API certificate SANs
      ansible.builtin.blockinfile:
        path: "{{ k3s_config_path }}"
        marker: "# {mark} ANSIBLE MANAGED K3S TLS SANS"
        block: |
          tls-san:
          {% for san in ([k3s_api_endpoint] + k3s_tls_sans) | unique %}
            - "{{ san }}"
          {% endfor %}
      when: k3s_api_endpoint | length > 0
      notify: Restart k3s

    - name: Configure K3s join endpoint
      ansible.builtin.blockinfile:
        path: "{{ k3s_config_path }}"
        marker: "# {mark} ANSIBLE MANAGED K3S JOIN ENDPOINT"
        block: |
          server: "https://{{ k3s_api_endpoint }}:6443"
      notify: Restart k3s

    - name: Download K3s installer
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        owner: root
        group: root
        mode: "0755"

    - name: Install latest joining K3s server
      ansible.builtin.command: /tmp/k3s-install.sh
      args:
        creates: /usr/local/bin/k3s
      environment:
        INSTALL_K3S_EXEC: "server --server https://{{ k3s_api_endpoint }}:6443 --token {{ hostvars[groups['k3s_servers'][0]].k3s_node_token }}"
      when: k3s_version | length == 0

    - name: Install pinned joining K3s server
      ansible.builtin.command: /tmp/k3s-install.sh
      args:
        creates: /usr/local/bin/k3s
      environment:
        INSTALL_K3S_EXEC: "server --server https://{{ k3s_api_endpoint }}:6443 --token {{ hostvars[groups['k3s_servers'][0]].k3s_node_token }}"
        INSTALL_K3S_VERSION: "{{ k3s_version }}"
      when: k3s_version | length > 0

    - name: Ensure joining K3s server is enabled and running
      ansible.builtin.service:
        name: k3s
        enabled: true
        state: started

- name: Fetch kubeconfig from primary K3s server
  hosts: k3s_servers[0]
  become: true
  tasks:
    - name: Wait for kubeconfig
      ansible.builtin.wait_for:
        path: "{{ k3s_kubeconfig_path }}"
        timeout: 120

    - name: Create local generated kubeconfig directory
      ansible.builtin.file:
        path: "{{ k3s_local_kubeconfig_dir }}"
        state: directory
        mode: "0750"
      become: false
      delegate_to: localhost

    - name: Read kubeconfig from primary node
      ansible.builtin.slurp:
        src: "{{ k3s_kubeconfig_path }}"
      register: k3s_kubeconfig

    - name: Write local kubeconfig with reachable server address
      ansible.builtin.copy:
        dest: "{{ k3s_local_kubeconfig_dir }}/{{ inventory_hostname }}.yaml"
        mode: "0600"
        content: "{{ k3s_kubeconfig.content | b64decode | regex_replace('https://127.0.0.1:6443', 'https://' + k3s_api_endpoint + ':6443') }}"
      become: false
      delegate_to: localhost

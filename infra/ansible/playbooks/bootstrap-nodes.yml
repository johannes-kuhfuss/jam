---
- name: Bootstrap K3s nodes
  hosts: all
  become: true
  handlers:
    - name: Reload sysctl
      ansible.builtin.command: sysctl --system
      changed_when: true

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - open-iscsi
          - qemu-guest-agent
          - nfs-common
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure qemu guest agent is running
      ansible.builtin.service:
        name: qemu-guest-agent
        enabled: true
        state: started

    - name: Disable swap for current boot
      ansible.builtin.command: swapoff -a
      when: ansible_swaptotal_mb | int > 0
      changed_when: true

    - name: Disable swap in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    - name: Load required kernel modules
      ansible.builtin.command: "modprobe {{ item }}"
      changed_when: false
      loop:
        - br_netfilter
        - overlay

    - name: Persist required kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k3s.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          br_netfilter
          overlay

    - name: Configure Kubernetes sysctl settings
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-k3s.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1
      notify: Reload sysctl

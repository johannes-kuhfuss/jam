apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public-api
  namespace: envoy-gateway-system
spec:
  gatewayClassName: envoy
  addresses:
    - type: IPAddress
      value: 192.168.200.217
  listeners:
    - name: http
      hostname: "*.mam.jku.internal"
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      hostname: "*.mam.jku.internal"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: mam-jku-internal-wildcard-tls
      allowedRoutes:
        namespaces:
          from: All

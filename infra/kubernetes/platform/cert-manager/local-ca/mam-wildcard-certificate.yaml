apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mam-jku-internal-wildcard
  namespace: envoy-gateway-system
spec:
  secretName: mam-jku-internal-wildcard-tls
  commonName: "*.mam.jku.internal"
  dnsNames:
    - "*.mam.jku.internal"
    - mam.jku.internal
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: jam-local-ca
    kind: ClusterIssuer
    group: cert-manager.io

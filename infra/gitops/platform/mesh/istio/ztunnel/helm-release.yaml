apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ztunnel
  namespace: istio-system
spec:
  dependsOn:
    - name: istio-cni
      namespace: istio-system
  interval: 30m
  chart:
    spec:
      chart: ztunnel
      version: 1.30.1
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: istio-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  dependsOn:
    - name: istio-base
      namespace: istio-system
  interval: 30m
  chart:
    spec:
      chart: istiod
      version: 1.30.1
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: istio-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    profile: ambient
    meshConfig:
      accessLogFile: /dev/stdout

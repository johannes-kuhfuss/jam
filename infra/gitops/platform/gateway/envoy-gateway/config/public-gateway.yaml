apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public-api
  namespace: envoy-gateway-system
spec:
  gatewayClassName: envoy
  listeners:
    - name: http
      hostname: "*.jam.example"
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All

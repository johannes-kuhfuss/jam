apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zitadel-postgresql
  namespace: zitadel
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: postgresql
      version: 18.5.13
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: zitadel
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    auth:
      database: zitadel
      username: zitadel
      password: zitadel
      postgresPassword: zitadel
    primary:
      persistence:
        storageClass: longhorn

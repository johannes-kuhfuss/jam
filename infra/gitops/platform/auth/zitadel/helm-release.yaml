apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zitadel
  namespace: zitadel
spec:
  suspend: false
  interval: 30m
  timeout: 15m
  dependsOn:
    - name: zitadel-postgresql
      namespace: zitadel
  chart:
    spec:
      chart: zitadel
      version: 10.0.2
      sourceRef:
        kind: HelmRepository
        name: zitadel
        namespace: zitadel
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicaCount: 1
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      readOnlyRootFilesystem: true
      privileged: false
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    env:
      - name: ZITADEL_DATABASE_POSTGRES_DSN
        value: host=zitadel-postgresql port=5432 user=postgres password=zitadel dbname=zitadel sslmode=disable
    zitadel:
      masterkeySecretName: zitadel-masterkey
      configmapConfig:
        ExternalDomain: 'auth.mam.jku.internal'
        ExternalPort: 443
        ExternalSecure: true
        TLS:
          Enabled: false
        FirstInstance:
          Org:
            Human:
              UserName: 'admin'
              Email: 'admin@mam.jku.internal'
              Password: 'Admin4Auth32!'
              PasswordChangeRequired: true
    ingress:
      enabled: false
    login:
      ingress:
        enabled: false
    postgresql:
      enabled: false

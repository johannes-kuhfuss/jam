name: Infrastructure Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.6.6"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ansible tooling
        run: python -m pip install ansible yamllint

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra/terraform

      - name: Validate Terraform lab environment
        run: |
          terraform -chdir=infra/terraform/environments/lab init -backend=false
          terraform -chdir=infra/terraform/environments/lab validate

      - name: Lint YAML
        run: yamllint .

      - name: Check Ansible syntax
        working-directory: infra/ansible
        run: |
          ansible-playbook --syntax-check -i inventories/lab/hosts.yml.example playbooks/bootstrap-nodes.yml
          ansible-playbook --syntax-check -i inventories/lab/hosts.yml.example playbooks/harden-nodes.yml
          ansible-playbook --syntax-check -i inventories/lab/hosts.yml.example playbooks/install-k3s.yml

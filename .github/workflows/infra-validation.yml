name: Infrastructure Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.10.6"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install YAML tooling
        run: python -m pip install yamllint

      - name: Check OpenTofu formatting
        run: tofu fmt -check -recursive infra/opentofu

      - name: Validate OpenTofu lab environment
        run: |
          tofu -chdir=infra/opentofu/environments/lab init -backend=false
          tofu -chdir=infra/opentofu/environments/lab validate

      - name: Lint YAML
        run: yamllint .
